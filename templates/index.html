<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض العقيق للسيارات</title>
    <style>
        /* التنسيقات العامة والألوان الاحترافية */
        :root {
            --primary-blue: #0056b3;
            --dark-blue: #003366;
            --white: #ffffff;
            --light-gray: #f8f9fa;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-gray);
            color: var(--text-color);
            box-sizing: border-box;
        }

        /* الهيدر العلوي للموقع */
        .main-header {
            background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
            color: var(--white);
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .main-header h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .main-header p {
            margin: 15px 0 0 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* حاوية شبكة السيارات */
        .cars-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* كرت السيارة */
        .car-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .car-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #eee;
        }

        .car-details {
            padding: 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .car-name {
            font-size: 1.4rem;
            color: var(--dark-blue);
            margin: 0 0 15px 0;
            font-weight: bold;
        }

        .quote-button {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .quote-button:hover {
            background-color: var(--dark-blue);
        }

        /* القائمة العائمة العمودية على يسار الشاشة */
        .vertical-floating-menu {
            position: fixed;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
        }

        .v-float-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            text-decoration: none;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .v-float-btn:hover {
            transform: scale(1.12) translateY(-3px);
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.35);
        }

        .whatsapp-btn {
            background-color: #25D366;
        }

        .phone-btn {
            background-color: var(--primary-blue);
        }

        /* النافذة المنبثقة لطلب عرض السعر */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-box {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal-title {
            margin: 0 0 20px 0;
            color: var(--dark-blue);
            font-size: 1.5rem;
            text-align: center;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .submit-btn {
            background-color: #28a745;
            color: var(--white);
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #218838;
        }

        /* تحسينات العرض على الجوالات */
        @media (max-width: 768px) {
            .main-header h1 { font-size: 2rem; }
            .main-header p { font-size: 1rem; }
            .vertical-floating-menu { left: 15px; }
            .v-float-btn { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- الهيدر العلوي -->
    <header class="main-header">
        <h1>معرض العقيق للسيارات الجديدة والمستعملة</h1>
        <p>التميز والفخامة في اختيار سيارتك القادمة موديل 2026</p>
    </header>

    <!-- شبكة عرض السيارات الخمسة -->
    <main class="cars-container">
        <div class="cars-grid">
            
            <!-- السيارة الأولى -->
            <div class="car-card">
                <img src="static/images/camry.jpg.jpg" alt="سيارة 1" class="car-image">
                <div class="car-details">
                    <h3 class="car-name">تويوتا كامري</h3>
                    <button class="quote-button" onclick="openModal('تويوتا كامري')">طلب عرض سعر</button>
                </div>
            </div>

            <!-- السيارة الثانية -->
            <div class="car-card">
                <img src="static/images/fordtors2026.jpg" alt="سيارة 2" class="car-image">
                <div class="car-details">
                    <h3 class="car-name">فورد توروس</h3>
                    <button class="quote-button" onclick="openModal('فورد توروس')">طلب عرض سعر</button>
                </div>
            </div>

            <!-- السيارة الثالثة -->
            <div class="car-card">
                <img src="static/images/mazda.jpg" alt="سيارة 3" class="car-image">
                <div class="car-details">
                    <h3 class="car-name">مازدا 6</h3>
                    <button class="quote-button" onclick="openModal('مازدا 6')">طلب عرض سعر</button>
                </div>
            </div>

            <!-- السيارة الرابعة -->
            <div class="car-card">
                <img src="static/images/camry.jpg" alt="سيارة 4" class="car-image">
                <div class="car-details">
                    <h3 class="car-name">هيونداي سوناتا</h3>
                    <button class="quote-button" onclick="openModal('هيونداي سوناتا')">طلب عرض سعر</button>
                </div>
            </div>

            <!-- السيارة الخامسة -->
            <div class="car-card">
                <img src="static/images/landcrozer2026.jpg" alt="سيارة 5" class="car-image">
                <div class="car-details">
                    <h3 class="car-name">لكزس ES</h3>
                    <button class="quote-button" onclick="openModal('لكزس ES')">طلب عرض سعر</button>
                </div>
            </div>

        </div>
    </main>

    <!-- الأزرار العائمة العمودية على يسار الشاشة -->
    <div class="vertical-floating-menu">
        <a href="https://wa.me/966505306600" class="v-float-btn whatsapp-btn" target="_blank" title="تواصل عبر الواتساب">💬</a>
        <a href="tel:+966505306600" class="v-float-btn phone-btn" title="اتصل بنا الآن">📞</a>
    </div>

    <!-- النافذة المنبثقة لطلب السعر -->
    <div class="modal-overlay" id="quoteModal">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 class="modal-title">طلب عرض سعر مالي</h3>
            <form action="/submit_request" method="POST">
                <input type="hidden" id="carNameInput" name="car_name">
                <input type="text" name="client_name" class="form-input" placeholder="اسمك الكريم" required>
                <input type="tel" name="client_phone" class="form-input" placeholder="رقم الجوال" required>
                <button type="submit" class="submit-btn">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <!-- جافا سكريبت للتحكم بالنافذة المنبثقة -->
    <script>
        function openModal(carName) {
            document.getElementById('carNameInput').value = carName;
            document.getElementById('quoteModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('quoteModal').style.display = 'none';
        }

        // إغلاق النافذة عند الضغط خارج المربع الأبيض
        window.onclick = function(event) {
            var modal = document.getElementById('quoteModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>

</body>
</html>
